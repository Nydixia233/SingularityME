<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>网络标签页 — Singularity ME</title>
<link rel="stylesheet" href="shared-palette.css">
<style>
  /* ── 页面容器 ── */
  .overlay {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: rgba(5, 7, 11, 0.67); /* BG_OVERLAY */
  }

  .panel {
    width: min(90vw, 720px);
    height: min(90vh, 500px);
    display: flex; flex-direction: column;
    gap: var(--gap-lg);
    padding: var(--pad-xl);
    background: rgba(20, 25, 35, 0.93); /* BG_PANEL */
    border: 1px solid var(--border-panel);
    border-radius: var(--radius-panel);
    overflow: hidden;
  }

  /* ── 标题行 ── */
  .title-row {
    display: flex; align-items: center;
    height: 34px; flex-shrink: 0;
  }
  .title-row h1 {
    flex: 1; min-width: 0;
    color: var(--text-primary);
    font-size: 15px; font-weight: 700;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  /* ── 摘要区 ── */
  .summary-row {
    display: flex; gap: var(--gap-lg);
    height: 56px; flex-shrink: 0;
  }
  .summary-box {
    flex: 1; min-width: 0;
    padding: var(--gap-lg);
    border: 1px solid;
    border-radius: var(--radius-row);
    display: flex; flex-direction: column; gap: 2px;
  }
  .summary-box .label { color: var(--text-muted); font-size: 12px; }
  .summary-box .value {
    color: var(--text-primary);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  /* ── 列表头 ── */
  .list-header {
    display: flex; justify-content: space-between;
    height: 24px; flex-shrink: 0;
    color: var(--text-muted); font-size: 12px;
  }

  /* ── 网络列表 ── */
  .network-list {
    flex: 1 1 0; min-height: 72px;
    overflow-y: auto; overflow-x: hidden;
    background: var(--bg-list);
    border: 1px solid var(--border-list);
    border-radius: var(--radius-row);
  }
  .network-list .empty {
    padding: var(--gap-lg);
    color: var(--text-empty);
    text-align: center;
  }

  /* ── 网络行 ── */
  .network-row {
    display: flex; align-items: center;
    height: var(--row-h);
    padding: 0 var(--pad-sm);
    gap: var(--gap-md);
    border: 1px solid var(--border-row);
    cursor: pointer;
    transition: background 0.12s, border-color 0.12s;
  }
  .network-row:not(:last-child) { border-bottom: none; }
  .network-row:hover { filter: brightness(1.1); }
  .network-row .name {
    flex: 1; min-width: 0;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  /* ── 选中栏 ── */
  .selected-bar {
    display: flex; align-items: center;
    height: 38px; flex-shrink: 0;
    padding: 0 var(--pad-md); gap: var(--gap-md);
    background: var(--bg-list);
    border: 1px solid var(--border-list);
    border-radius: var(--radius-row);
  }
  .selected-bar .text {
    flex: 1; min-width: 0;
    color: var(--text-secondary);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  /* ── 底部操作区 ── */
  .bottom {
    display: flex; flex-direction: column;
    gap: var(--gap-md); flex-shrink: 0;
  }
  .action-row {
    display: flex; align-items: center;
    gap: var(--gap-sm); flex-wrap: wrap; flex-shrink: 0;
  }
  .action-row input { flex: 1; min-width: 120px; }

  /* ── 按钮尺寸变体 ── */
  .btn-sm  { width: 110px; }
  .btn-md  { width: 180px; }
</style>
</head>
<body>

<div class="overlay">
  <div class="panel">

    <!-- 标题行 -->
    <div class="title-row">
      <h1>🌐 网络标签页</h1>
    </div>

    <!-- 摘要区 -->
    <div class="summary-row">
      <div class="summary-box" id="summaryDevice" style="background:rgba(119,119,119,0.18); border-color:#777;">
        <span class="label">设备网络</span>
        <span class="value">-</span>
      </div>
      <div class="summary-box" id="summaryDefault" style="background:rgba(119,119,119,0.18); border-color:#777;">
        <span class="label">默认网络</span>
        <span class="value">-</span>
      </div>
    </div>

    <!-- 列表头 -->
    <div class="list-header">
      <span>按 名称 排序</span>
      <span id="totalCount">共 0 个网络</span>
    </div>

    <!-- 网络列表 -->
    <div class="network-list" id="networkList">
      <div class="empty">暂无可用网络</div>
    </div>

    <!-- 选中栏 -->
    <div class="selected-bar" id="selectedBar">
      <span class="text">未选中任何网络</span>
    </div>

    <!-- 底部操作区 -->
    <div class="bottom" id="bottomArea">
      <!-- 默认显示选择按钮 -->
      <div class="action-row">
        <button class="btn btn-md" id="selectBtn" disabled>选择并分配到此设备</button>
      </div>
    </div>

  </div>
</div>

<script>
// ============================================================
// 模拟数据 — 对应 PacketNetworkTabData.NetworkEntry
// ============================================================
const MOCK_NETWORKS = [
  { networkID: 0,  name: "未分配",   color: 0x777777, security:"PUBLIC",  access:"NONE",     permissions:"-",         canBuild:true,  ownerName:"-",       isOwner:false },
  { networkID: 1,  name: "主基地网络", color: 0x4A90E2, security:"PRIVATE", access:"OWNER",    permissions:"OWNER",     canBuild:true,  ownerName:"PlayerX", isOwner:true },
  { networkID: 2,  name: "采矿前哨",  color: 0xE2A84A, security:"PRIVATE", access:"MEMBER",   permissions:"B C I E",   canBuild:true,  ownerName:"Steve",   isOwner:false },
  { networkID: 3,  name: "公共交易站", color: 0x4AE24A, security:"PUBLIC",  access:"MEMBER",   permissions:"B C I E S", canBuild:true,  ownerName:"Alex",    isOwner:false },
  { networkID: 4,  name: "实验室网络", color: 0x7B68EE, security:"PRIVATE", access:"SECURITY", permissions:"B C I E S", canBuild:true,  ownerName:"Notch",   isOwner:false },
  { networkID: 5,  name: "只读仓库",   color: 0xE24A4A, security:"PRIVATE", access:"MEMBER",   permissions:"E",         canBuild:false, ownerName:"Builder", isOwner:false },
];

const DEVICE_NETWORK_ID = 1;   // 设备当前网络
const DEFAULT_NETWORK_ID = 1;  // 玩家默认网络

let selectedNetworkID = DEVICE_NETWORK_ID;

// ── 安全级别映射 (对应 SecurityLevel) ──
const SECURITY = {
  PUBLIC:    { name:"公开",     short:"公", color:"var(--security-public)" },
  PRIVATE:   { name:"私有",     short:"私", color:"var(--security-private)" },
};

// ── 权限摘要映射 (B/C/I/E/S 来自 AE2 SecurityPermissions) ──
const ACCESS = {
  OWNER:    { name:"拥有者", short:"OWN", color:"var(--access-owner)" },
  SECURITY: { name:"安全",   short:"S",   color:"var(--access-admin)" },
  MEMBER:   { name:"成员",   short:"B/C", color:"var(--access-member)" },
  NONE:     { name:"无权限", short:"-",   color:"var(--access-none)" },
};

// ── 工具函数 ──
function entryColor(entry) {
  return entry.networkID === 0 ? 'var(--color-unassigned)' : '#' + (entry.color & 0xFFFFFF).toString(16).padStart(6,'0');
}
function darken(hex, factor) {
  const r = Math.floor(parseInt(hex.slice(1,3),16) * factor);
  const g = Math.floor(parseInt(hex.slice(3,5),16) * factor);
  const b = Math.floor(parseInt(hex.slice(5,7),16) * factor);
  return '#' + [r,g,b].map(v => Math.max(0,Math.min(255,v)).toString(16).padStart(2,'0')).join('');
}
function securityInfo(entry) { return SECURITY[entry.security] || SECURITY.PUBLIC; }
function accessInfo(entry)   { return ACCESS[entry.access] || ACCESS.NONE; }
function canAccess(entry) {
  if (entry.access !== 'NONE') return true;
  return entry.security === 'PUBLIC';
}

// ── 渲染 ──
function entryById(id) { return MOCK_NETWORKS.find(e => e.networkID === id); }
function selectedEntry() { return entryById(selectedNetworkID); }

function render() {
  renderSummary();
  renderList();
  renderSelectedBar();
  renderBottom();
}

// 摘要区
function renderSummary() {
  const dev = entryById(DEVICE_NETWORK_ID);
  const def = entryById(DEFAULT_NETWORK_ID);
  setSummaryBox('summaryDevice', '设备网络',
    dev ? (dev.networkID === 0 ? '默认' : dev.name) : '-',
    dev ? entryColor(dev) : 'var(--color-unassigned)');
  setSummaryBox('summaryDefault', '默认网络',
    def ? (def.networkID === 0 ? '默认' : def.name) : '-',
    def ? entryColor(def) : 'var(--color-unassigned)');
}

function setSummaryBox(id, label, value, color) {
  const box = document.getElementById(id);
  box.querySelector('.label').textContent = label;
  box.querySelector('.value').textContent = value;
  box.style.backgroundColor = darken(color, 0.18);
  box.style.borderColor = color;
}

// 列表
function renderList() {
  const list = document.getElementById('networkList');
  list.innerHTML = '';
  const visible = MOCK_NETWORKS.filter(e => e.networkID !== 0);
  document.getElementById('totalCount').textContent = `共 ${visible.length} 个网络`;

  if (visible.length === 0) {
    list.innerHTML = '<div class="empty">暂无可用网络</div>';
    return;
  }

  visible.forEach(entry => {
    const row = document.createElement('div');
    row.className = 'network-row';
    const selected = entry.networkID === selectedNetworkID;
    const color = entryColor(entry);
    const isCurrent = entry.networkID === DEVICE_NETWORK_ID;
    const isDefault = entry.networkID === DEFAULT_NETWORK_ID;

    row.style.backgroundColor = selected ? darken(color, 0.32) : 'var(--bg-row)';
    row.style.borderColor = selected ? color : 'var(--border-row)';

    row.addEventListener('click', () => {
      selectedNetworkID = entry.networkID;
      render();
    });

    // 色块
    const swatch = document.createElement('span');
    swatch.className = 'swatch';
    swatch.style.backgroundColor = color;
    row.appendChild(swatch);

    // ID 胶囊
    const pill = document.createElement('span');
    pill.className = 'id-pill';
    pill.textContent = '#' + entry.networkID;
    row.appendChild(pill);

    // 名称
    const name = document.createElement('span');
    name.className = 'name';
    name.textContent = entry.name;
    name.style.color = selected ? '#FFF' : 'var(--text-secondary)';
    row.appendChild(name);

    // 安全级别徽章
    const sec = securityInfo(entry);
    const secBadge = document.createElement('span');
    secBadge.className = 'badge';
    secBadge.textContent = sec.short;
    secBadge.style.backgroundColor = sec.color;
    row.appendChild(secBadge);

    // 访问级别徽章
    const acc = accessInfo(entry);
    const accBadge = document.createElement('span');
    accBadge.className = 'badge';
    accBadge.textContent = entry.isOwner ? acc.short : entry.permissions;
    accBadge.style.backgroundColor = acc.color;
    row.appendChild(accBadge);

    // 当前网络标记 *
    if (isCurrent) {
      const star = document.createElement('span');
      star.className = 'badge';
      star.textContent = '*';
      star.style.backgroundColor = 'var(--badge-current)';
      row.appendChild(star);
    }

    // 默认网络标记
    if (isDefault) {
      const d = document.createElement('span');
      d.className = 'badge';
      d.textContent = '默认';
      d.style.backgroundColor = 'var(--badge-default)';
      row.appendChild(d);
    }

    list.appendChild(row);
  });
}

// 选中栏
function renderSelectedBar() {
  const bar = document.getElementById('selectedBar');
  const sel = selectedEntry();
  const color = sel ? entryColor(sel) : 'var(--border-list)';
  bar.style.borderColor = color;
  bar.querySelector('.text').textContent = sel
    ? `已选中：${sel.name}  #${sel.networkID}  ${securityInfo(sel).name}  (${sel.permissions})`
    : '未选中任何网络';
}

// 底部操作区
function renderBottom() {
  const bottom = document.getElementById('bottomArea');
  const sel = selectedEntry();
  const canAssign = sel && sel.networkID !== DEVICE_NETWORK_ID
    && canAccess(sel)
    && sel.canBuild;

  bottom.innerHTML = `
    <div class="action-row">
      <button class="btn btn-md" id="selectBtn">选择并分配到此设备</button>
    </div>
  `;
  const selectBtn = document.getElementById('selectBtn');
  selectBtn.disabled = !canAssign;
  selectBtn.addEventListener('click', () => {
    if (!sel || !canAssign) return;
    alert(`[模拟] 将设备网络设置为 #${sel.networkID} "${sel.name}"`);
  });
}

// ── 初始化 ──
render();
</script>

</body>
</html>
