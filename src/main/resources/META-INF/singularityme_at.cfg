# Access Transformer for Singularity ME
# Opens private fields in AE2's grid system for our global network implementation

# GridNode - need to read/write the grid reference and connections list
public-f appeng.me.GridNode myGrid
public-f appeng.me.GridNode connections
public-f appeng.me.GridNode playerID

# Grid - need to access machines map, pivot node, and storage for merging
public-f appeng.me.Grid machines
public-f appeng.me.Grid pivot
public-f appeng.me.Grid myStorage

# Grid methods - need to call add/remove directly
public appeng.me.Grid add(Lappeng/me/GridNode;)V
public appeng.me.Grid remove(Lappeng/me/GridNode;)V

# GridConnection - need to create virtual connections between nodes and anchor
public appeng.me.GridConnection <init>(Lappeng/me/GridNode;Lappeng/me/GridNode;Lnet/minecraftforge/common/util/ForgeDirection;)V

# AENetworkProxy - need to access the node field to intercept grid assignment
public-f appeng.me.helpers.AENetworkProxy node
public-f appeng.me.helpers.AENetworkProxy owner
